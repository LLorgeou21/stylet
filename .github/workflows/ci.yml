name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS 2 Jazzy
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: jazzy

      - name: Install dependencies (rosdep)
        run: |
          source /opt/ros/jazzy/setup.bash
          sudo apt-get update
          rosdep update
          rosdep install --from-paths src --ignore-src -r -y

      # --parallel-workers 1: the hosted runner has 7GB RAM / 2 cores - building
      # multiple heavy packages at once (moveit_ros_planning_interface for
      # stylet_planning, Qt5/rviz for stylet_ui) can exceed that and get the
      # job silently killed rather than fail with a normal compiler error.
      # Slower, but reliable.
      - name: Build workspace
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build --cmake-args -DBUILD_TESTING=ON --parallel-workers 1

      # Runs only the hand-written gtest unit tests (pure-math functions: the
      # approach-orientation construction, the allowed-collision-matrix merge
      # logic, the PCA sign-disambiguation used by GICP registration) - not
      # the full colcon test suite. ament_lint_auto/ament_lint_common are
      # already wired into every package.xml for local development, but the
      # existing codebase predates enforcing them and isn't clean yet
      # (mostly flake8 style preferences on launch files); making the CI gate
      # depend on that today would fail for reasons unrelated to correctness.
      # Fixing the lint backlog and folding `colcon test` in wholesale is
      # tracked as follow-up work, not done here.
      - name: Run unit tests
        run: |
          source /opt/ros/jazzy/setup.bash
          source install/setup.bash
          colcon test --ctest-args -R "test_geometry_utils|test_registration_utils"
          colcon test-result --verbose
